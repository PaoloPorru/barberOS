# Blueprint: Render crea Postgres + Web Service e collega DATABASE_URL da solo.
# Dashboard → New → Blueprint → repo barberOS (branch main).
# Se hai già solo il Web Service: New → PostgreSQL (free), poi nel servizio web
# collega "DATABASE_URL" dalla scheda Connect del database, oppure rifai deploy da Blueprint.
databases:
  - name: barberos-db
    databaseName: barberos
    plan: free
    region: frankfurt

services:
  - type: web
    name: barberos-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm run build
    # Pre-Deploy non è incluso nel piano free Render: la migrazione parte all’avvio (vedi app.js).
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: barberos-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: BarberOS
