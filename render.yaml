# Blueprint Render: Dashboard → New → Blueprint → collega questo repo.
# Poi imposta a mano le variabili "sync: false" (DATABASE_URL, REDIS_URL, FRONTEND_URL, email).
services:
  - type: web
    name: barberos-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: BarberOS
